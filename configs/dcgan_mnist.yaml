# DCGAN calibration baseline for MNIST.
#
# A textbook non-saturating DCGAN (Radford et al. 2016) trained through the exact
# same BaseTrainer harness as the OT-GAN: same [-1, 1] data pipeline, same EMA
# sampling, same FID/KID evaluator. Published FID numbers are not comparable
# across evaluation pipelines (Lucic et al. 2018), so this run pins down what a
# well-understood baseline scores under *our* evaluator — the reference point
# against which the OT-GAN's numbers should be read.
model: dcgan
dataset: mnist
channels: 1
image_size: 32
data_root: data

# Optimization (canonical DCGAN hyperparameters: Adam lr 2e-4, beta1 0.5).
# The loader yields 2 * batch_size images per step (the OT-GAN needs two
# independent halves); the DCGAN step trains on the full 256-image batch.
batch_size: 128
z_dim: 100
learning_rate: 0.0002
beta1: 0.5
beta2: 0.999
n_epochs: 10
latent: gaussian

# Quality levers
ema_decay: 0.999

# Evaluation / logging
n_samples: 64         # images in the fixed-noise sample grid
log_step: 1           # epochs between sample-grid snapshots
fid_every: 5          # epochs between FID/IS evaluations (0 disables)
n_eval: 10000         # samples per side for FID/KID (MNIST test set caps real at 10k)
eval_dir: baselines/dcgan/eval
ckpt_dir: baselines/dcgan/ckpt
log_dir: baselines/dcgan/logs

# Reproducibility / misc
seed: 11
device: auto          # auto -> cuda > mps > cpu
num_workers: 2
