name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check otgan tests
      - run: ruff format --check otgan tests

  type:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (torch CPU wheels)
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
      - run: mypy otgan

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (torch CPU wheels)
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
      - name: Fast test suite with coverage gate
        run: pytest -q -m "not slow" --cov=otgan --cov-report=term-missing --cov-fail-under=85

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (torch CPU wheels)
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
      - name: Cache MNIST
        uses: actions/cache@v4
        with:
          path: data
          key: mnist-v1
      - name: Train one smoke epoch (no FID, no Inception download)
        run: otgan train -c configs/smoke.yaml --override fid_every=0 num_workers=0
      - name: Sample from the smoke checkpoint
        run: otgan sample -c configs/smoke.yaml --ckpt weights_smoke/ot_gan.pt -n 16 -o /tmp/smoke_samples.png
      - name: Resolved-config sanity
        run: otgan config -c configs/mnist.yaml
